name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run deploy command
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Some Azure-hosted runner subnets cannot reach the home server's
          # public IP (intermittent geo/ISP routing issues), retry up to 3
          # times with backoff before giving up.
          for attempt in 1 2 3; do
            if ssh -i ~/.ssh/id_ed25519 \
                   -o StrictHostKeyChecking=accept-new \
                   -o ConnectTimeout=15 \
                   "$DEPLOY_USER@$DEPLOY_HOST"; then
              exit 0
            fi
            echo "SSH attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          echo "SSH failed after 3 attempts"
          exit 1
