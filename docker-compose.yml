services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: relay:latest
    container_name: relay
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB path inside the container to use the mounted volume
      RELAY_DB_PATH: /var/lib/relay/relay.db
    volumes:
      - relay-data:/var/lib/relay
    ports:
      # Bind only to loopback; expose externally via Caddy reverse proxy
      - "127.0.0.1:18804:18804"  # MCP resource server
      - "127.0.0.1:18805:18805"  # OAuth authorization server

volumes:
  relay-data:
    driver: local
