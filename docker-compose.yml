services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: relay:latest
    container_name: relay
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB path inside the container to use the mounted volume
      RELAY_DB_PATH: /var/lib/relay/relay.db
    volumes:
      - relay-data:/var/lib/relay
    ports:
      # Bind to LAN-side host IP so the existing Caddy container can reach it.
      # Caddy on this host already proxies kitepon.dynv6.net.
      - "192.168.1.2:18804:18804"

volumes:
  relay-data:
    driver: local
